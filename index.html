<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Conversor Ultra PRO+</title>
    
    

    <link rel="stylesheet" href="css/styles.css">
    <link rel="manifest" href="manifest/site.webmanifest">
    <link rel="icon" type="image/png" href="assets/favicon-192.png">
    <meta name="theme-color" content="#d4af37">
    <script src="js/script.js" defer></script>
    <script>
        if('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(() => {});
            });
        }
    </script>
        </head>
<body>

<div class="app-card">
    <div class="status-bar">
        <div class="pulse-dot"></div>
        TASAS EN VIVO ACTUALIZADAS
    </div>

    <header>
        <h2>Conversor PRO+</h2>
    </header>

    <div class="input-group">
        <input type="number" id="amount" value="1" placeholder="0.00">
    </div>

    <div class="currency-row">
        <div class="select-box">
            <img id="flagFrom" class="flag-img" src="">
            <select id="fromCurrency"></select>
        </div>
        <button class="swap-btn" onclick="swapCurrencies()">⇄</button>
        <div class="select-box">
            <img id="flagTo" class="flag-img" src="">
            <select id="toCurrency"></select>
        </div>
    </div>

    <div class="result-display">
        <span id="resultText">0.00</span>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
        <button class="btn-alt" onclick="saveFavorite()">⭐ Guardar</button>
        <button class="btn-alt" onclick="showHistory()">📜 Historial</button>
    </div>

    <canvas id="chartCanvas"></canvas>
</div>


</body>
</html>
